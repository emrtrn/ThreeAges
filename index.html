<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Mobile-first viewport: no user zoom (game handles its own gestures),
      viewport-fit=cover so we can pad UI with safe-area insets on notched phones.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <title>3DGameDev Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!--
      Layer structure (decided in docs/2026-06-12-engine-decision.md §4):
      - #game-canvas: the single three.js WebGL2 canvas (scene layer only).
      - #ui-overlay:  hybrid HTML/CSS UI on top — no engine GUI. Root ignores
        pointer events; interactive children opt back in (.ui-interactive).
    -->
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div id="debug-stats" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
